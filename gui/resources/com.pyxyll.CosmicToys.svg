<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Rounded slate background; same shape PowerToys uses, with the
       "toys" punchline rendered as three letter-blocks inside. -->
  <rect width="128" height="128" rx="28" fill="#1E293B"/>

  <!-- T (purple), slight left tilt -->
  <g transform="translate(12 48)">
    <g transform="rotate(-8 16 16)">
      <rect width="32" height="32" rx="6" fill="#A855F7"/>
      <text x="16" y="23" font-family="sans-serif" font-weight="700"
            font-size="22" fill="#FFFFFF" text-anchor="middle">T</text>
    </g>
  </g>

  <!-- O (pink), upright -->
  <g transform="translate(48 48)">
    <rect width="32" height="32" rx="6" fill="#EC4899"/>
    <text x="16" y="23" font-family="sans-serif" font-weight="700"
          font-size="22" fill="#FFFFFF" text-anchor="middle">O</text>
  </g>

  <!-- Y (cyan), slight right tilt -->
  <g transform="translate(84 48)">
    <g transform="rotate(6 16 16)">
      <rect width="32" height="32" rx="6" fill="#06B6D4"/>
      <text x="16" y="23" font-family="sans-serif" font-weight="700"
            font-size="22" fill="#FFFFFF" text-anchor="middle">Y</text>
    </g>
  </g>
</svg>
