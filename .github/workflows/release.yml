name: Release

# Triggers on tag push (v*) and on manual dispatch (lets us test the workflow
# without actually cutting a release first).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev \
            libwayland-dev \
            libfontconfig1-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Build workspace (release)
        run: cargo build --release --workspace --locked

      - name: Install cargo-deb + cargo-generate-rpm
        run: |
          cargo install --locked cargo-deb
          cargo install --locked cargo-generate-rpm

      - name: Build .deb
        run: cargo deb -p cosmic-toys --no-build --no-strip
        # cargo-deb writes to target/debian/<pkg>_<version>_<arch>.deb

      - name: Build .rpm
        run: cargo generate-rpm -p gui --auto-req disabled
        # cargo-generate-rpm writes to target/generate-rpm/<pkg>-<version>-<arch>.rpm
        # auto-req disabled because the binary deps are listed manually in
        # [package.metadata.generate-rpm.requires]; auto-detection picks up
        # too many low-level libs and produces brittle requires lists.

      - name: Build static-binary tarball
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          VERSION="${VERSION:-dev}"
          STAGING="cosmic-toys-${VERSION}-x86_64-linux"
          mkdir -p "$STAGING"/{bin,share/applications,share/icons/hicolor/scalable/apps,share/metainfo,lib/systemd/user}
          cp target/release/cosmic-toys        "$STAGING/bin/"
          cp target/release/cosmic-toysd       "$STAGING/bin/"
          cp target/release/cosmic-toys-applet "$STAGING/bin/"
          cp gui/resources/com.pyxyll.CosmicToys.desktop                "$STAGING/share/applications/"
          cp applet/resources/com.pyxyll.CosmicToysApplet.desktop       "$STAGING/share/applications/"
          cp gui/resources/com.pyxyll.CosmicToys.svg                    "$STAGING/share/icons/hicolor/scalable/apps/"
          cp gui/resources/com.pyxyll.CosmicToys.metainfo.xml           "$STAGING/share/metainfo/"
          cp dist/systemd/cosmic-toysd.service                         "$STAGING/lib/systemd/user/"
          cp LICENSE README.md "$STAGING/"
          tar -czf "$STAGING.tar.gz" "$STAGING"

      - name: Collect artifacts into a release dir
        run: |
          mkdir -p release-artifacts
          cp target/debian/*.deb              release-artifacts/
          cp target/generate-rpm/*.rpm        release-artifacts/
          cp cosmic-toys-*.tar.gz     release-artifacts/
          ls -la release-artifacts/

      - name: Upload artifacts to GitHub release
        # Only on tag push, not on workflow_dispatch (which is just for testing the build)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          fail_on_unmatched_files: true
          # If the release was created manually first (e.g. via gh release create),
          # this just attaches files. If not, it creates a draft.
          generate_release_notes: false

      - name: Upload artifacts as workflow output (dispatch run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: release-artifacts/
